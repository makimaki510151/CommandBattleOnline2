<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒険の始まり</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/party.css">
    <link rel="stylesheet" href="styles/battle.css">
</head>

<body>
    <div id="mobile-warning-overlay" class="hidden">
        <div class="warning-box">
            <h3>🚨 非推奨端末でのアクセス警告 🚨</h3>
            <p>このアプリケーションはPCでの利用を想定しています。</p>
            <p>スマートフォンやタブレットでの動作は保証されません。特にオンライン対戦では予期せぬエラーが発生する可能性があります。</p>
            <button id="close-warning-button">閉じる</button>
        </div>
    </div>
    <div id="title-screen">
        <h1 class="game-title">コマンドローグライク</h1>
        <div class="controls">
            <button id="online-button">オンライン対戦</button>
            <div class="volume-control">
                <span>音量</span>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
        </div>
    </div>

    <div id="online-screen" class="hidden">
        <h2>オンライン対戦</h2>
        <div class="online-controls">
            <div id="room-selection">
                <input type="text" id="room-name-input" placeholder="ルームIDを入力 (例: battle123)">
                <button id="join-room-button">入室して対戦相手を待つ</button>
            </div>
            <div id="connection-status"></div>
            <div id="player-count"></div>
        </div>

        <div id="online-setup" class="hidden">
            <p>相手の準備を待っています...</p>
            <button id="online-party-go-button" class="hidden">バトル開始！</button>
        </div>

        <button id="back-to-title-button">タイトルに戻る</button>
    </div>

    <div id="party-screen" class="hidden">
        <header class="party-header">
            <div class="header-buttons">
                <button id="back-button" class="action-button">戻る</button>
            </div>
            <h2 class="header-title">パーティー編成</h2>
            <div class="header-buttons">
                <button id="go-button" class="action-button">出かける</button>
            </div>
        </header>

        <div class="main-content">
            <div class="character-pane">
                <h3>キャラクター一覧</h3>
                <div id="character-list">
                </div>
            </div>
            <div class="right-pane">
                <div id="party-slots-container">
                    <h3>パーティー</h3>
                    <div class="party-slots">
                        <div class="party-slot" data-slot-id="0"></div>
                        <div class="party-slot" data-slot-id="1"></div>
                        <div class="party-slot" data-slot-id="2"></div>
                        <div class="party-slot" data-slot-id="3"></div>
                    </div>
                </div>
                <div id="character-details">
                    <h3>詳細情報</h3>
                    <div id="details-content">
                        <p class="placeholder">キャラクターを選択してください</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="battle-screen" class="hidden">
        <header class="game-header">
        </header>

        <main class="battle-container">
            <div class="battlefield">
                <div id="enemy-party" class="party-area enemies">
                </div>
                <div id="player-party" class="party-area players">
                </div>
            </div>

            <div class="ui-container">
                <div id="command-area" class="command-box hidden">
                </div>
                <div id="message-log" class="log-box">
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/room/dist/skyway_room-latest.js"></script>
    <script type="module" src="scripts/party.js"></script>
    <script type="module" src="scripts/battle.js"></script>
    <script type="module" src="scripts/main.js"></script>
    <script type="module" src="scripts/characters.js"></script>
    <script type="module" src="scripts/enemies.js"></script>
</body>

</html>
